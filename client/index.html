    <!-- Google Consent Mode v2: default denied until user accepts -->
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('consent', 'default', {
        analytics_storage: 'denied',
        ad_storage: 'denied',
        ad_user_data: 'denied',
        ad_personalization: 'denied',

      });
      // Gespeicherte Einwilligung anwenden: JSON {"statistics","marketing"}
      // (granular) oder Legacy-Wert "all" (alles erteilt).
      var stored = null;
      try { stored = localStorage.getItem('cookie-consent'); } catch(e) {}
      var consentStats = false, consentMkt = false;
      if (stored === 'all') { consentStats = true; consentMkt = true; }
      else if (stored && stored.charAt(0) === '{') {
        try {
          var prefs = JSON.parse(stored);
          consentStats = !!prefs.statistics;
          consentMkt = !!prefs.marketing;
        } catch(e) {}
      }
      if (consentStats || consentMkt) {
        gtag('consent', 'update', {
          analytics_storage: consentStats ? 'granted' : 'denied',
          ad_storage: consentMkt ? 'granted' : 'denied',
          ad_user_data: consentMkt ? 'granted' : 'denied',
          ad_personalization: consentMkt ? 'granted' : 'denied'
        });
      }
